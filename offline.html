<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>الضاد | بدون اتصال</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: "Cairo", sans-serif;
      background: linear-gradient(135deg, #16324f 0%, #4aa3a2 55%, #8abf7b 100%);
      color: #16324f;
      padding: 16px;
    }
    .card {
      width: min(420px, 100%);
      background: rgba(255,255,255,0.96);
      border-radius: 24px;
      padding: 24px;
      text-align: center;
      box-shadow: 0 20px 40px rgba(15, 34, 53, 0.18);
    }
    img { width: 110px; max-width: 40vw; }
    h1 { margin-bottom: 8px; }
    p { line-height: 1.9; color: #526377; }
    a {
      display: inline-block;
      margin-top: 12px;
      padding: 10px 16px;
      border-radius: 14px;
      text-decoration: none;
      color: #fff;
      background: linear-gradient(135deg, #2f6f79 0%, #4aa3a2 60%, #f59e0b 100%);
      font-weight: 700;
    }
  </style>
</head>
<body>
  <div class="card">
    <img src="logo-logo.png" alt="شعار لعبة الضاد" />
    <h1>أنت الآن بدون اتصال</h1>
    <p>النسخة المثبتة من لعبة الضاد ما زالت تعمل بالملفات المحفوظة. جرّب العودة إلى الصفحة الرئيسية أو أعد المحاولة عند توفر الإنترنت.</p>
    <a href="./index.html">العودة إلى اللعبة</a>
  </div>
</body>
</html>
