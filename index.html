<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>لعبة التفاعل في اللغة العربية</title>
  <link rel="stylesheet" href="arabic-game.css" />
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@700&display=swap" rel="stylesheet" />
</head>
<body>
  <header class="main-header">
    <h1>لعبة التفاعل في اللغة العربية</h1>
  </header>
  <main class="main-content">
    <!-- نموذج دخول المعلم -->
    <section id="adminLoginSection">
      <h2>دخول المعلم</h2>
      <input type="password" id="adminPassword" placeholder="كلمة مرور المعلم" autocomplete="off" />
      <button id="adminLoginBtn" class="edit-btn">دخول</button>
      <div id="adminLoginMsg" class="msg-error"></div>
    </section>
    <!-- نموذج اسم الطالب -->
    <section id="studentNameSection" class="hidden-section">
      <h2>أدخل اسمك للبدء</h2>
      <input type="text" id="studentNameInput" placeholder="اسم الطالب" autocomplete="off" />
      <button id="studentStartBtn" class="edit-btn">بدء الاختبار</button>
      <div id="studentNameMsg" class="msg-error"></div>
    </section>
    <!-- لوحة تحكم المعلم -->
    <section id="adminPanelSection" class="hidden-section">
      <h2>لوحة تحكم المعلم</h2>
      <div class="admin-quiz-type">
        <button id="btnAllDomains" class="admin-type-btn selected">جميع المجالات</button>
        <button id="btnDomainOnly" class="admin-type-btn">مجال محدد</button>
        <button id="btnBranchOnly" class="admin-type-btn">فرع محدد</button>
      </div>
      <div class="admin-quiz-options">
        <div id="adminDomainWrap" class="hidden-section">
          <label>المجال:
            <select id="adminDomainSelect">
              <option value="comprehension">الفهم والثروة</option>
              <option value="rhetoric">البلاغة</option>
              <option value="grammar">القواعد</option>
            </select>
          </label>
        </div>
        <div id="adminBranchWrap" class="hidden-section">
          <label>الفرع:
            <select id="adminBranchSelect"></select>
          </label>
        </div>
        <label>عدد الأسئلة:
          <input type="number" id="adminNumQuestions" min="15" value="15" class="num-questions-input" />
        </label>
        <button id="adminStartQuizBtn" class="edit-btn admin-start-btn">بدء اختبار للطالب</button>
      </div>
      <button id="adminLogoutBtn" class="back-btn">تسجيل خروج</button>
      <style>
        .admin-quiz-type {
          display: flex;
          gap: 1.2em;
          justify-content: center;
          margin-bottom: 18px;
        }
        .admin-type-btn {
          background: linear-gradient(90deg, #f7971e 0%, #ffd200 100%);
          color: #fff;
          border: none;
          border-radius: 10px;
          font-size: 1.1em;
          font-weight: bold;
          padding: 0.7em 2.2em;
          box-shadow: 0 2px 8px rgba(247,151,30,0.13);
          cursor: pointer;
          transition: background 0.2s, color 0.2s, transform 0.15s;
        }
        .admin-type-btn.selected, .admin-type-btn:focus {
          background: linear-gradient(90deg, #30cfd0 0%, #330867 100%);
          color: #fff;
          transform: scale(1.07);
          outline: none;
        }
        .admin-quiz-options label {
          margin: 0 10px 0 0;
          font-weight: bold;
          color: #7c3aed;
        }
        .admin-quiz-options {
          display: flex;
          flex-wrap: wrap;
          align-items: center;
          gap: 1.2em;
          justify-content: center;
          margin-bottom: 10px;
        }
      </style>
    </section>
    <!-- واجهة الطالب والاختبار (كما كانت) -->
    <section id="domainSection" class="hidden-section">
      <h2>اختر المجال</h2>
      <div class="domain-btns">
        <button class="domain-btn" data-domain="comprehension">الفهم والثروة</button>
        <button class="domain-btn" data-domain="rhetoric">البلاغة</button>
        <button class="domain-btn" data-domain="grammar">القواعد</button>
      </div>
    </section>
    <section id="branchSection" class="hidden-section">
      <h2>اختر الفرع</h2>
      <div class="branch-btns"></div>
      <button id="backToDomains" class="back-btn">رجوع</button>
    </section>
    <section id="questionSection" class="hidden-section">
      <h2 id="questionTitle">السؤال</h2>
      <div id="questionArea"></div>
      <form id="answerForm"></form>
      <div id="resultArea"></div>
      <div id="quizProgress" class="quiz-progress"></div>
      <button id="generateQuestionBtn" class="edit-btn hidden-btn">توليد سؤال جديد</button>
      <button id="backToBranches" class="back-btn">رجوع</button>
    </section>
    <!-- نتيجة الطالب -->
    <section id="studentResultSection" class="hidden-section">
      <h2>نتيجتك</h2>
      <div id="studentResultMsg"></div>
      <button id="studentRestartBtn" class="edit-btn">إعادة المحاولة</button>
    </section>
  </main>
  <footer class="main-footer">
    <span class="footer-icon" title="كتاب">&#x1F4D6;</span>
    <span class="footer-icon" title="ريشة">&#x1F58B;&#xFE0F;</span>
    الحقوق محفوظة " طه كامل" &copy; 2026
  </footer>
  <script src="arabic-game.js"></script>
</body>
</html>
